# This uses CircleCI's dynamic configuration feature to calculate some
# parameters before executing the workflows. You're probably looking for
# `.circleci/workflows.yml` if you need to change the CI configuration.

---
version: 2.1
setup: true

parameters:
  # use this parameter to disable building the windows host. This is useful to cut down build times and
  # cost in cases where you want to experiment with linux builds and are not interested in windows results
  full-build-x86_64-pc-windows-msvc-host:
    type: boolean
    default: true
  # use this parameter to disable building the darwin host. This is useful to cut down build times and
  # cost in cases where you want to experiment with linux builds and are not interested in darwin results
  full-build-aarch64-darwin-host:
    type: boolean
    default: true

orbs:
  aws-cli: circleci/aws-cli@5.4.2
  ferrocene: ferrocene/ferrocene-common@0.0.2
  continuation: circleci/continuation@0.2.0

jobs:
  setup:
    docker:
      - image: cimg/python:3.12
    resource_class: ferrocene/k8s-arm64-small # 1-core
    steps:
      - aws-cli/install:
          version: 2.35.11
          override_installed: true

      - ferrocene/aws_oidc_auth
      - ferrocene/checkout
      - ferrocene/setup_uv

      - run:
          name: Calculate the parameters for the workflow
          command: |
            ferrocene/ci/scripts/calculate_parameters.py > /tmp/continue-parameters.json
            cat /tmp/continue-parameters.json

      - continuation/continue:
          configuration_path: .circleci/workflows.yml
          parameters: /tmp/continue-parameters.json

      - run:
          name: Wait for continuation job to complete
          command: ferrocene/ci/wait-for-pipeline.sh

workflows:
  version: 2
  setup:
    when:
      or:
        - equal: [<< pipeline.git.branch >>, "staging"]
        - equal: [<< pipeline.git.branch >>, "trying"]
        - equal: [<< pipeline.trigger_source >>, "api"]
    jobs: [setup]
