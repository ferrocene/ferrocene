[["tests/run-make"]]
tests = [
    "tests/run-make/sanitizer-cdylib-link",
    "tests/run-make/sanitizer-dylib-link",
    "tests/run-make/sanitizer-staticlib-link"
]
targets = ["aarch64-unknown-linux-gnu"]
reason = "QEMU user space emulation doesn't support most sanitizers"

[["tests/run-make"]]
tests = [
    "tests/run-make/c-link-to-rust-va-list-fn",
]
targets = ["thumbv7em-ferrocene.facade-eabi", "thumbv7em-ferrocene.facade-eabihf"]
reason = "<assert.h> is not available for inclusion on this platform"

[["tests/run-make"]]
tests = [
    "tests/run-make/c-link-to-rust-va-list-fn",
]
targets = ["armv7r-ferrocene.facade-eabihf", "aarch64-unknown-nto-qnx710", "x86_64-pc-nto-qnx710", "aarch64-unknown-nto-qnx800", "x86_64-pc-nto-qnx800"]
reason = "Fails with linker errors on `-lpthread`, `-ldl`, and `-lrt`"

[["tests/run-make"]]
tests = [
    "tests/run-make/c-link-to-rust-va-list-fn",
]
targets = ["aarch64r82-unknown-ferrocene.facade", "aarch64v8r-unknown-ferrocene.facade", "aarch64-unknown-ferrocene.facade"]
reason = "libcheckrust includes symbols which cannot be used without `-fPIC` on this platform"

[["tests/ui"]]
tests = [
    "tests/ui/command/command-argv0.rs",
]
targets = ["aarch64-unknown-ferrocene.facade", "thumbv7em-ferrocene.facade-eabi", "thumbv7em-ferrocene.facade-eabihf"]
reason = "QEMU user space emulation behaves differently with argv0"

[["tests/ui"]]
tests = [
    "tests/ui/process/no-stdio.rs",
    "tests/ui/process/nofile-limit.rs",
]
targets = ["aarch64-unknown-ferrocene.facade", "aarch64r82-unknown-ferrocene.facade", "aarch64v8r-unknown-ferrocene.facade", "armv7r-ferrocene.facade-eabihf", "thumbv7em-ferrocene.facade-eabi", "thumbv7em-ferrocene.facade-eabihf"]
reason = "QEMU user space emulation behaves differently when spawning processes fails"

[["tests/ui"]]
tests = [
    "tests/ui/hygiene/panic-location.rs",
    "tests/ui/intrinsics/const-eval-select-backtrace-std.rs",
    "tests/ui/intrinsics/const-eval-select-backtrace.rs",
    "tests/ui/lto/issue-105637.rs",
    "tests/ui/macros/assert-long-condition.rs",
    "tests/ui/panics/fmt-only-once.rs",
    "tests/ui/panics/location-detail-panic-no-column.rs",
    "tests/ui/panics/location-detail-panic-no-file.rs",
    "tests/ui/panics/location-detail-panic-no-line.rs",
    "tests/ui/panics/location-detail-panic-no-location-info.rs",
    "tests/ui/panics/location-detail-unwrap-no-file.rs",
    "tests/ui/panics/panic-in-message-fmt.rs",
    "tests/ui/process/println-with-broken-pipe.rs",
    "tests/ui/test-attrs/test-panic-abort-nocapture.rs",
    "tests/ui/test-attrs/test-panic-abort.rs",
]
targets = ["aarch64-unknown-ferrocene.facade", "aarch64r82-unknown-ferrocene.facade", "aarch64v8r-unknown-ferrocene.facade", "armv7r-ferrocene.facade-eabihf", "thumbv7em-ferrocene.facade-eabi", "thumbv7em-ferrocene.facade-eabihf"]
reason = "QEMU user space emulation outputs an extra message when an abort happens"

[["tests/debuginfo"]]
tests = ["tests/debuginfo"]
targets = ["aarch64r82-unknown-ferrocene.facade", "aarch64v8r-unknown-ferrocene.facade", "aarch64-unknown-ferrocene.facade", "thumbv7em-ferrocene.facade-eabi", "thumbv7em-ferrocene.facade-eabihf"]
reason = "Running these tests require changes to bootstrap"

[["tests/ui"]]
tests = [
    "tests/ui/alloc-error/alloc-error-backtrace.rs"
]
targets = ["aarch64-unknown-ferrocene.facade", "aarch64r82-unknown-ferrocene.facade", "aarch64v8r-unknown-ferrocene.facade", "armv7r-ferrocene.facade-eabihf", "thumbv7em-ferrocene.facade-eabi", "thumbv7em-ferrocene.facade-eabihf"]
reason = "These targets cannot unwind"

[["tests/ui"]]
tests = [
    "tests/ui/asm/aarch64/ttbr0_el2.rs"
]
targets = ["aarch64r82-unknown-ferrocene.facade", "aarch64v8r-unknown-ferrocene.facade"]
reason = "TTBR0_EL2 is not present on Armv8-R AArch64, where EL2 only supports PMSA"

[["tests/ui"]]
tests = [
    "tests/ui/threads-sendsync/mpsc_stress.rs"
]
targets = ["aarch64r82-unknown-ferrocene.facade"]
reason = "libstd test that segfaults on QEMU 8.2.2 but works on newer QEMU versions"

[["tests/run-make"]]
tests = [
    "tests/run-make/fix-cortex-a53-843419"
]
targets = ["aarch64r82-unknown-ferrocene.facade", "aarch64v8r-unknown-ferrocene.facade"]
reason = "This errata does not affect Armv8-R AArch64 processors"

[["tests/run-make"]]
tests = [
    "tests/run-make/sanitizer-cdylib-link",
    "tests/run-make/sanitizer-dylib-link",
    "tests/run-make/sanitizer-staticlib-link"
]
targets = ["aarch64-rhivos2-linux-gnu"]
reason = "Sanitizers are not a qualified compiler feature. Support on RHIVOS2 needs investigation."

[["tests/ui"]]
tests = [
    "tests/ui/sanitizer/hwaddress.rs",
    "tests/ui/sanitizer/leak.rs",
    "tests/ui/sanitizer/memory-eager.rs",
    "tests/ui/sanitizer/memory-passing.rs",
    "tests/ui/sanitizer/memory.rs",
    "tests/ui/sanitizer/realtime-alloc.rs",
    "tests/ui/sanitizer/realtime-blocking.rs",
    "tests/ui/sanitizer/realtime-caller.rs",
    "tests/ui/sanitizer/thread.rs"
]
targets = ["aarch64-rhivos2-linux-gnu"]
reason = "Sanitizers are not a qualified compiler feature. Support on RHIVOS2 needs investigation."

[["tests/run-make"]]
tests = [
    "tests/run-make/pointer-auth-link-with-c"
]
targets = ["aarch64-rhivos2-linux-gnu", "aarch64-unknown-linux-gnu"]
reason = "This tests the interoperabilty an unstable feature of the rust compiler (enabling PAC) with newer C compilers (‘-mbranch-protection=’)."
